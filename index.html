<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📋 任务管理器</title>
<style>
/* ===== 全局重置与基础 ===== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #f0f2f5;
  --card-bg: #ffffff;
  --text: #2c3e50;
  --text-secondary: #7f8c8d;
  --border: #e0e4e8;
  --primary: #4A90D9;
  --primary-hover: #357ABD;
  --danger: #E74C3C;
  --danger-hover: #C0392B;
  --urgent: #E74C3C;
  --high: #F39C12;
  --medium: #27AE60;
  --low: #95A5A6;
  --completed-bg: #ecf0f1;
  --shadow: 0 2px 8px rgba(0,0,0,0.08);
  --shadow-hover: 0 4px 16px rgba(0,0,0,0.12);
  --radius: 12px;
  --radius-sm: 8px;
  --transition: 0.2s ease;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", "Helvetica Neue", sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.6;
  min-height: 100vh;
  padding: 16px;
}

.container {
  max-width: 720px;
  margin: 0 auto;
}

/* ===== 头部 ===== */
.header {
  text-align: center;
  padding: 24px 0 16px;
}
.header h1 {
  font-size: 28px;
  font-weight: 700;
  color: var(--text);
}
.header .subtitle {
  font-size: 14px;
  color: var(--text-secondary);
  margin-top: 4px;
}

/* ===== 输入区 ===== */
.input-section {
  background: var(--card-bg);
  border-radius: var(--radius);
  padding: 20px;
  box-shadow: var(--shadow);
  margin-bottom: 16px;
}
.input-section textarea {
  width: 100%;
  min-height: 160px;
  border: 2px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 12px 16px;
  font-size: 15px;
  font-family: inherit;
  resize: vertical;
  transition: border-color var(--transition);
  line-height: 1.6;
}
/* 快捷操作栏 */
.quick-fields {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 10px;
  margin-top: 12px;
}
.quick-field label {
  display: block;
  font-size: 13px;
  font-weight: 600;
  color: var(--text-secondary);
  margin-bottom: 4px;
}
.quick-field input {
  width: 100%;
  padding: 8px 10px;
  border: 2px solid var(--border);
  border-radius: var(--radius-sm);
  font-size: 14px;
  font-family: inherit;
  transition: border-color var(--transition);
}
.quick-field input:focus {
  outline: none;
  border-color: var(--primary);
}
.desc-field-row {
  margin-top: 10px;
}
.desc-field-row label {
  display: block;
  font-size: 13px;
  font-weight: 600;
  color: var(--text-secondary);
  margin-bottom: 4px;
}
.desc-field-row input {
  width: 100%;
  padding: 8px 10px;
  border: 2px solid var(--border);
  border-radius: var(--radius-sm);
  font-size: 14px;
  font-family: inherit;
  transition: border-color var(--transition);
}
.desc-field-row input:focus {
  outline: none;
  border-color: var(--primary);
}
@media (max-width: 600px) {
  .quick-fields {
    grid-template-columns: repeat(2, 1fr);
  }
}
.input-section textarea:focus {
  outline: none;
  border-color: var(--primary);
}
.input-section .input-hint {
  font-size: 12px;
  color: var(--text-secondary);
  margin-top: 8px;
  line-height: 1.5;
}
.input-section .btn-row {
  display: flex;
  gap: 10px;
  margin-top: 12px;
  flex-wrap: wrap;
}
.btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 10px 20px;
  border: none;
  border-radius: var(--radius-sm);
  font-size: 15px;
  font-family: inherit;
  cursor: pointer;
  transition: all var(--transition);
  font-weight: 500;
  white-space: nowrap;
}
.btn-primary {
  background: var(--primary);
  color: #fff;
}
.btn-primary:hover { background: var(--primary-hover); }
.btn-outline {
  background: #fff;
  color: var(--text);
  border: 2px solid var(--border);
}
.btn-outline:hover { border-color: var(--primary); color: var(--primary); }
.btn-danger {
  background: #fff;
  color: var(--danger);
  border: 2px solid var(--danger);
}
.btn-danger:hover { background: var(--danger); color: #fff; }
.btn-sm {
  padding: 6px 12px;
  font-size: 13px;
}

/* ===== 工具栏 ===== */
.toolbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 10px;
  margin-bottom: 16px;
  padding: 12px 16px;
  background: var(--card-bg);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
}
.stats {
  display: flex;
  gap: 16px;
  font-size: 14px;
  flex-wrap: wrap;
}
.stat-item {
  display: flex;
  align-items: center;
  gap: 4px;
}
.stat-num {
  font-weight: 700;
  font-size: 18px;
}
.stat-num.total { color: var(--primary); }
.stat-num.active { color: var(--medium); }
.stat-num.done { color: var(--low); }
.toolbar-actions {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}

/* ===== 任务列表 ===== */
.task-list {
  display: flex;
  flex-direction: column;
  gap: 10px;
  margin-bottom: 16px;
}
.empty-state {
  text-align: center;
  padding: 48px 20px;
  color: var(--text-secondary);
}
.empty-state .icon { font-size: 48px; margin-bottom: 12px; }
.empty-state p { font-size: 15px; }

/* ===== 任务卡片 ===== */
.task-card {
  background: var(--card-bg);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  padding: 16px 20px;
  transition: all var(--transition);
  border-left: 4px solid transparent;
  position: relative;
}
.task-card:hover { box-shadow: var(--shadow-hover); }
.task-card.priority-urgent { border-left-color: var(--urgent); }
.task-card.priority-high { border-left-color: var(--high); }
.task-card.priority-medium { border-left-color: var(--medium); }
.task-card.priority-low { border-left-color: var(--low); }
.task-card.overdue { background: #fef5f5; }
.task-card.overdue .deadline-text { color: var(--danger); font-weight: 600; }

.task-card.completed {
  opacity: 0.7;
  background: var(--completed-bg);
}
.task-card.completed .task-event { text-decoration: line-through; }

.task-card .card-top {
  display: flex;
  align-items: flex-start;
  gap: 12px;
}
.task-card .checkbox-wrap {
  flex-shrink: 0;
  padding-top: 2px;
}
.task-card input[type="checkbox"] {
  width: 22px;
  height: 22px;
  cursor: pointer;
  accent-color: var(--primary);
  /* 移动端触摸友好 */
  min-width: 22px;
  min-height: 22px;
}

.task-card .card-body { flex: 1; min-width: 0; }
.task-card .task-event {
  font-size: 16px;
  font-weight: 600;
  color: var(--text);
  word-break: break-word;
}
.task-card /* 任务元信息（日期/时间/地点/优先级）*/
.task-meta {
  display: flex;
  align-items: center;
  gap: 12px;
  flex-wrap: wrap;
  margin-top: 6px;
  font-size: 16px;
  color: var(--text-secondary);
}
.deadline-text { display: flex; align-items: center; gap: 4px; font-size: 16px; }
.location-text { display: flex; align-items: center; gap: 4px; font-size: 16px; color: #7f8c8d; }
.priority-badge {
  display: inline-flex;
  align-items: center;
  gap: 3px;
  padding: 3px 12px;
  border-radius: 12px;
  font-size: 15px;
  font-weight: 600;
  white-space: nowrap;
  margin-left: auto;
}
.priority-badge.urgent { background: #fde8e8; color: var(--urgent); }
.priority-badge.high { background: #fef3e2; color: var(--high); }
.priority-badge.medium { background: #e8f5e9; color: var(--medium); }
.priority-badge.low { background: #ecf0f1; color: var(--low); }

.task-card .task-desc {
  margin-top: 10px;
  padding: 10px 14px;
  background: #f8f9fa;
  border-radius: var(--radius-sm);
  font-size: 14px;
  color: #555;
  line-height: 1.6;
  word-break: break-word;
}
.task-card .card-actions {
  display: flex;
  gap: 8px;
  margin-top: 10px;
}

/* ===== 已完成区域 ===== */
.completed-section {
  margin-top: 8px;
}
.completed-header {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 12px 16px;
  background: var(--card-bg);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  cursor: pointer;
  user-select: none;
  font-weight: 600;
  font-size: 15px;
  transition: all var(--transition);
}
.completed-header:hover { box-shadow: var(--shadow-hover); }
.completed-header .arrow {
  transition: transform var(--transition);
  font-size: 12px;
}
.completed-header .arrow.open { transform: rotate(90deg); }
.completed-list {
  display: none;
  flex-direction: column;
  gap: 8px;
  margin-top: 10px;
}
.completed-list.show { display: flex; }

/* ===== 编辑弹窗 ===== */
.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.4);
  z-index: 100;
  justify-content: center;
  align-items: center;
  padding: 20px;
}
.modal-overlay.show { display: flex; }
.modal {
  background: var(--card-bg);
  border-radius: var(--radius);
  padding: 24px;
  width: 100%;
  max-width: 500px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.2);
}
.modal h3 { margin-bottom: 16px; font-size: 18px; }
.modal label {
  display: block;
  font-size: 14px;
  font-weight: 600;
  margin-bottom: 4px;
  margin-top: 12px;
  color: var(--text);
}
.modal label:first-of-type { margin-top: 0; }
.modal input, .modal textarea, .modal select {
  width: 100%;
  padding: 10px 12px;
  border: 2px solid var(--border);
  border-radius: var(--radius-sm);
  font-size: 14px;
  font-family: inherit;
  transition: border-color var(--transition);
}
.modal input:focus, .modal textarea:focus, .modal select:focus {
  outline: none;
  border-color: var(--primary);
}
.modal textarea { min-height: 80px; resize: vertical; }
.modal .btn-row { justify-content: flex-end; margin-top: 16px; }

/* ===== Toast 提示 ===== */
.toast {
  position: fixed;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%) translateY(100px);
  background: #2c3e50;
  color: #fff;
  padding: 12px 24px;
  border-radius: 24px;
  font-size: 14px;
  z-index: 200;
  opacity: 0;
  transition: all 0.3s ease;
  pointer-events: none;
  white-space: nowrap;
}
.toast.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}

/* ===== 响应式：移动端 ===== */
@media (max-width: 600px) {
  body { padding: 8px; }
  .header h1 { font-size: 22px; }
  .header { padding: 12px 0 8px; }
  .input-section { padding: 14px; }
  .input-section textarea { min-height: 64px; font-size: 14px; }
  .btn { padding: 10px 16px; font-size: 14px; }
  .task-card { padding: 12px 14px; }
  .task-card .task-event { font-size: 15px; }
  .task-card input[type="checkbox"] { width: 24px; height: 24px; }
  .toolbar { padding: 10px 12px; }
  .stats { gap: 10px; font-size: 13px; }
  .stat-num { font-size: 16px; }
  .modal { padding: 16px; max-width: 95vw; }
  .task-card .card-actions .btn-sm { padding: 8px 12px; font-size: 13px; }
  .priority-badge { font-size: 11px; padding: 2px 8px; }
}
</style>
</head>
<body>

<div class="container">
  <!-- 头部 -->
  <div class="header">
    <h1>📋 任务管理器</h1>
  </div>

  <!-- 输入区 -->
  <div class="input-section">
    <textarea id="taskInput" placeholder="输入任务内容，系统自动解析日期、时间、优先级和说明...&#10;也可以只写核心事件，在下方快捷栏手动填写其他信息"></textarea>
    <!-- 快捷操作栏 -->
    <div class="quick-fields">
      <div class="quick-field">
        <label>📅 日期</label>
        <input type="text" id="quickDate" placeholder="如：6.11 / 7月15日 / 2026.06.11">
      </div>
      <div class="quick-field">
        <label>⏰ 时间</label>
        <input type="text" id="quickTime" placeholder="如：下午3点 / 15:00">
      </div>
      <div class="quick-field">
        <label>📍 地点</label>
        <input type="text" id="quickLocation" placeholder="如：会议室A / 线上">
      </div>
      <div class="quick-field">
        <label>🔴 优先级</label>
        <input type="text" id="quickPriority" placeholder="如：紧急 / 高 / 中 / 低">
      </div>
    </div>
    <!-- 说明栏（独立一行） -->
    <div class="desc-field-row">
      <label>📄 说明</label>
      <input type="text" id="quickDesc" placeholder="补充说明">
    </div>
    <div class="btn-row">
      <button class="btn btn-primary" onclick="addTask()" title="快捷键: Ctrl+Enter">➕ 添加任务</button>
      <button class="btn btn-outline" onclick="clearInput()">✖ 清空输入</button>
      <span style="flex:1"></span>
      <button class="btn btn-outline" onclick="refreshTasks()">🔄 刷新任务</button>
    </div>
  </div>

  <!-- 工具栏 -->
  <div class="toolbar">
    <div class="stats">
      <span class="stat-item">📊 总计 <span class="stat-num total" id="statTotal">0</span></span>
      <span class="stat-item">⬜ 未完成 <span class="stat-num active" id="statActive">0</span></span>
      <span class="stat-item">✅ 已完成 <span class="stat-num done" id="statDone">0</span></span>
    </div>
    <div class="toolbar-actions">
      <button class="btn btn-outline btn-sm" onclick="exportJSON()">📤 导出JSON</button>
      <button class="btn btn-outline btn-sm" onclick="document.getElementById('importFile').click()">📥 导入JSON</button>
      <input type="file" id="importFile" accept=".json" style="display:none" onchange="importJSON(event)">
      <button class="btn btn-danger btn-sm" onclick="clearCompleted()">🗑 清空已完成</button>
    </div>
  </div>

  <!-- 活跃任务列表 -->
  <div class="task-list" id="activeTaskList"></div>
  <div class="empty-state" id="emptyState">
    <div class="icon">📝</div>
    <p>还没有任务，在上方输入你的第一条任务吧！</p>
  </div>

  <!-- 已完成区域 -->
  <div class="completed-section" id="completedSection" style="display:none">
    <div class="completed-header" onclick="toggleCompleted()">
      <span class="arrow" id="completedArrow">▶</span>
      ✅ 已完成 (<span id="completedCount">0</span>)
    </div>
    <div class="completed-list" id="completedList"></div>
  </div>
</div>

<!-- 详情弹窗（查看原始输入 + 说明） -->
<div class="modal-overlay" id="detailModal">
  <div class="modal">
    <h3>📋 任务详情</h3>
    <div style="max-height:60vh;overflow-y:auto;">
      <label style="margin-top:0">📝 原始输入</label>
      <div style="background:#f8f9fa;border-radius:8px;padding:12px;margin-bottom:12px;white-space:pre-wrap;font-size:14px;line-height:1.8;color:#2c3e50;min-height:40px;" id="detailRaw"></div>
      <label>📄 说明</label>
      <div style="background:#f8f9fa;border-radius:8px;padding:12px;white-space:pre-wrap;font-size:14px;line-height:1.8;color:#2c3e50;min-height:40px;" id="detailDesc"></div>
    </div>
    <div class="btn-row">
      <button class="btn btn-primary" onclick="closeDetail()">关闭</button>
    </div>
  </div>
</div>

<!-- 编辑弹窗 -->
<div class="modal-overlay" id="editModal">
  <div class="modal">
    <h3>✏️ 编辑任务</h3>
    <label>核心事件</label>
    <input type="text" id="editEvent" placeholder="任务名称">
    <label>截止日期</label>
    <input type="date" id="editDate">
    <label>截止时间</label>
    <input type="time" id="editTime">
    <label>地点</label>
    <input type="text" id="editLocation" placeholder="如：会议室A / 线上（可选）">
    <label>详细说明</label>
    <textarea id="editDesc" placeholder="补充说明（可选）"></textarea>
    <label>优先级</label>
    <select id="editPriority">
      <option value="urgent">🔴 紧急</option>
      <option value="high">🟡 高</option>
      <option value="medium" selected>🟢 中</option>
      <option value="low">⚪ 低</option>
    </select>
    <div class="btn-row">
      <button class="btn btn-outline" onclick="closeModal()">取消</button>
      <button class="btn btn-primary" onclick="saveEdit()">💾 保存</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
// ============================================================
// 数据管理
// ============================================================
const STORAGE_KEY = 'taskmanager_tasks';
let tasks = [];
let editingId = null;

function loadTasks() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    tasks = raw ? JSON.parse(raw) : [];
  } catch(e) {
    tasks = [];
  }
}

function saveTasks() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(tasks));
}

function generateId() {
  return 't_' + Date.now().toString(36) + '_' + Math.random().toString(36).slice(2, 8);
}

// ============================================================
// 自然语言解析引擎
// ============================================================
function parseNaturalLanguage(text) {
  let remaining = text.trim();
  if (!remaining) return null;

  const result = {
    event: '',
    deadlineDate: null,   // 'YYYY-MM-DD' or null
    deadlineTime: null,   // 'HH:MM' or null
    location: '',
    description: '',
    priority: 'medium'
  };

  const today = new Date();
  today.setHours(0, 0, 0, 0);

  // ---- 1. 提取日期 ----
  const datePatterns = [
    // 点分隔完整日期: 2026.06.11 / 2026.7.8
    {
      regex: /(\d{4})\.(\d{1,2})\.(\d{1,2})(?![.\d])/,
      handler: (m) => {
        const d = new Date(parseInt(m[1]), parseInt(m[2]) - 1, parseInt(m[3]));
        return isValidDate(d) ? d : null;
      }
    },
    // ISO格式: 2026-07-08 或 2026/07/08
    {
      regex: /(\d{4})[-\/](\d{1,2})[-\/](\d{1,2})/,
      handler: (m) => {
        const d = new Date(parseInt(m[1]), parseInt(m[2]) - 1, parseInt(m[3]));
        return isValidDate(d) ? d : null;
      }
    },
    // 中文完整日期: 2026年7月8日 / 2026年7月8号
    {
      regex: /(\d{4})\s*年\s*(\d{1,2})\s*月\s*(\d{1,2})\s*[日号]/,
      handler: (m) => {
        const d = new Date(parseInt(m[1]), parseInt(m[2]) - 1, parseInt(m[3]));
        return isValidDate(d) ? d : null;
      }
    },
    // X月X日 / X月X号 / X月X
    {
      regex: /(\d{1,2})\s*月\s*(\d{1,2})\s*(?:[日号])?(?![0-9])/,
      handler: (m) => {
        const month = parseInt(m[1]) - 1;
        const day = parseInt(m[2]);
        let d = new Date(today.getFullYear(), month, day);
        if (d < today) {
          d = new Date(today.getFullYear() + 1, month, day);
        }
        return isValidDate(d) ? d : null;
      }
    },
    // 点分隔月日: 6.11 / 7.8（注意：在中文上下文中 6.11 表示6月11日）
    {
      regex: /(?:^|[^\d.])(\d{1,2})\.(\d{1,2})(?:[^\d.]|$)/,
      handler: (m) => {
        const month = parseInt(m[1]) - 1;
        const day = parseInt(m[2]);
        if (month < 0 || month > 11 || day < 1 || day > 31) return null;
        let d = new Date(today.getFullYear(), month, day);
        if (d < today) {
          d = new Date(today.getFullYear() + 1, month, day);
        }
        return isValidDate(d) ? d : null;
      }
    },
    // M/D 或 M-D: 7/8 或 7-8
    {
      regex: /(?:^|[^0-9])(\d{1,2})[\/\-](\d{1,2})(?:[^0-9]|$)/,
      handler: (m) => {
        const month = parseInt(m[1]) - 1;
        const day = parseInt(m[2]);
        if (month < 0 || month > 11 || day < 1 || day > 31) return null;
        let d = new Date(today.getFullYear(), month, day);
        if (d < today) {
          d = new Date(today.getFullYear() + 1, month, day);
        }
        return isValidDate(d) ? d : null;
      }
    },
    // 后天（在大后天之前匹配）
    { regex: /后天/, handler: () => offsetDate(today, 2) },
    // 大后天
    { regex: /大后天/, handler: () => offsetDate(today, 3) },
    // 今天
    { regex: /今天/, handler: () => new Date(today) },
    // 下下周X（在下周之前匹配）
    {
      regex: /下下周\s*([一二三四五六日天])/,
      handler: (m) => parseWeekday(m[1], 14)
    },
    // 下周X
    {
      regex: /下周\s*([一二三四五六日天])/,
      handler: (m) => parseWeekday(m[1], 7)
    },
    // 这周X / 本周X
    {
      regex: /(?:这周|本周)\s*([一二三四五六日天])/,
      handler: (m) => parseWeekday(m[1], 0)
    },
    // 周X（无前缀，默认最近的下一个）
    {
      regex: /周\s*([一二三四五六日天])/,
      handler: (m) => parseWeekday(m[1], 0)
    },
    // 星期X
    {
      regex: /星期\s*([一二三四五六日天])/,
      handler: (m) => parseWeekday(m[1], 0)
    },
    // X天后 / X天之后
    {
      regex: /(\d+)\s*天\s*(?:后|之后)/,
      handler: (m) => offsetDate(today, parseInt(m[1]))
    },
  ];

  let matchedDate = null;
  let matchedDateStr = '';

  for (const pattern of datePatterns) {
    const match = remaining.match(pattern.regex);
    if (match) {
      const d = pattern.handler(match);
      if (d && !isNaN(d.getTime())) {
        // 保留最早提到的日期
        if (!matchedDate || match.index < remaining.indexOf(matchedDateStr)) {
          matchedDate = d;
          matchedDateStr = match[0];
        }
      }
    }
  }

  if (matchedDate) {
    result.deadlineDate = formatDate(matchedDate);
    remaining = remaining.replace(matchedDateStr, ' ').replace(/\s+/g, ' ').trim();
  }

  // ---- 2. 提取时间 ----
  const timePatterns = [
    // 中文+冒号: 下午3:00 / 下午15:00 / 上午10:30（必须在裸HH:MM之前）
    { regex: /(凌晨|早上|上午|中午|下午|傍晚|晚上|夜里)\s*(\d{1,2})[:：](\d{2})(?!\d)/,
      handler: (m) => {
        const period = m[1];
        let hour = parseInt(m[2]);
        const minute = parseInt(m[3]);
        if (period === '凌晨') hour = (hour === 12 ? 0 : hour);
        else if (period === '早上' || period === '上午') hour = (hour === 12 ? 0 : hour);
        else if (period === '中午') hour = (hour === 12 ? 12 : hour + 12);
        else if (period === '下午') hour = (hour === 12 ? 12 : hour + 12);
        else if (period === '傍晚' || period === '晚上' || period === '夜里') hour = (hour === 12 ? 12 : hour + 12);
        return { h: hour, m: minute };
      }
    },
    // 中文: 下午3点 / 下午3点半 / 下午三点 / 下午三点半
    { regex: /(凌晨|早上|上午|中午|下午|傍晚|晚上|夜里)\s*(\d{1,2}|一|二|三|四|五|六|七|八|九|十|十一|十二|零)[点\.]\s*(半|(\d{1,2})分?)?/,
      handler: (m) => {
        const period = m[1];
        let hour = parseChineseNum(m[2]);
        const minute = m[3] === '半' ? 30 : (m[4] ? parseInt(m[4]) : 0);
        if (period === '凌晨') hour = (hour === 12 ? 0 : hour);
        else if (period === '早上' || period === '上午') hour = (hour === 12 ? 0 : hour);
        else if (period === '中午') hour = (hour === 12 ? 12 : hour + 12);
        else if (period === '下午') hour = (hour === 12 ? 12 : hour + 12);
        else if (period === '傍晚' || period === '晚上' || period === '夜里') hour = (hour === 12 ? 12 : hour + 12);
        return { h: hour, m: minute };
      }
    },
    // 简洁版: 下午3点 (无分钟)
    { regex: /(凌晨|早上|上午|中午|下午|傍晚|晚上|夜里)\s*(\d{1,2})\s*点(?![半\d])/,
      handler: (m) => {
        const period = m[1];
        let hour = parseInt(m[2]);
        if (period === '凌晨') hour = (hour === 12 ? 0 : hour);
        else if (period === '早上' || period === '上午') hour = (hour === 12 ? 0 : hour);
        else if (period === '中午') hour = (hour === 12 ? 12 : hour + 12);
        else if (period === '下午') hour = (hour === 12 ? 12 : hour + 12);
        else if (period === '傍晚' || period === '晚上' || period === '夜里') hour = (hour === 12 ? 12 : hour + 12);
        return { h: hour, m: 0 };
      }
    },
    // 裸24小时制: 15:00 / 15：00（没有时段前缀时使用）
    { regex: /(\d{1,2})[:：](\d{2})(?!\d)/, handler: (m) => ({ h: parseInt(m[1]), m: parseInt(m[2]) }) },
  ];

  let matchedTimeStr = '';
  for (const pattern of timePatterns) {
    const match = remaining.match(pattern.regex);
    if (match) {
      const t = pattern.handler(match);
      if (t && t.h >= 0 && t.h < 24 && t.m >= 0 && t.m < 60) {
        result.deadlineTime = String(t.h).padStart(2, '0') + ':' + String(t.m).padStart(2, '0');
        matchedTimeStr = match[0];
        break;
      }
    }
  }
  if (matchedTimeStr) {
    remaining = remaining.replace(matchedTimeStr, ' ').replace(/\s+/g, ' ').trim();
  }

  // ---- 3. 提取地点 ----
  const locationMarkers = [
    /(?:会议)?地点\s*[：:]\s*/,
    /(?:会议)?位置\s*[：:]\s*/,
    /地点[：:]\s*/,
    /位置[：:]\s*/,
    /[：:]\s*地点\s*/,
    /[：:]\s*位置\s*/,
    /在\s*[：:]*\s*(?:\S{1,20}(?:教室|会议室|房间|厅|楼|层|号|室|线上|腾讯会议|Zoom|Teams|钉钉|飞书|微信|雨课堂))/,
  ];

  let locStart = -1;
  let locMarkerLen = 0;
  let locFromRegex = null;
  for (const lm of locationMarkers) {
    const match = remaining.match(lm);
    if (match && (locStart === -1 || match.index < locStart)) {
      locStart = match.index;
      locMarkerLen = match[0].length;
      locFromRegex = lm;
    }
  }

  if (locStart >= 0) {
    // 特殊处理「在xxx教室/会议室」模式：提取「在」之后的地点短语
    if (/^在\s*[：:]*\s*/.test(remaining.slice(locStart, locStart + locMarkerLen))) {
      const afterZai = remaining.slice(locStart + locMarkerLen);
      // 取到下一个标点或空格为止
      const locEnd = afterZai.search(/[，,。.；;、\s]/);
      const locText = locEnd > 0 ? afterZai.slice(0, locEnd) : afterZai.slice(0, 30);
      result.location = locText.trim();
      remaining = (remaining.slice(0, locStart) + ' ' + afterZai.slice(locText.length)).replace(/\s+/g, ' ').trim();
    } else {
      // 标准「地点：xxx」模式：取冒号后到下一个标点
      const afterMarker = remaining.slice(locStart + locMarkerLen);
      const locEnd = afterMarker.search(/[，,。.；;、\n]/);
      const locText = locEnd > 0 ? afterMarker.slice(0, locEnd) : afterMarker.slice(0, 30);
      result.location = locText.trim();
      remaining = (remaining.slice(0, locStart) + ' ' + afterMarker.slice(locText.length)).replace(/\s+/g, ' ').trim();
    }
  }

  // ---- 4. 提取优先级 ----
  // urgent > high > medium(default) > low
  const priorityPatterns = [
    { regex: /(?:紧急|加急|ASAP|尽快|马上|立刻|赶紧|立即)/i, priority: 'urgent' },
    { regex: /(?:很重要|非常重要|高优先|高优先级)/, priority: 'high' },
    { regex: /(?:不急|不着急|低优先|有空再[做说搞]|闲了再|不急迫)/, priority: 'low' },
  ];
  let matchedPriorityStr = '';
  for (const pp of priorityPatterns) {
    const match = remaining.match(pp.regex);
    if (match) {
      result.priority = pp.priority;
      matchedPriorityStr = match[0];
      break;
    }
  }
  if (matchedPriorityStr) {
    remaining = remaining.replace(matchedPriorityStr, ' ').replace(/\s+/g, ' ').trim();
  }

  // ---- 5. 提取详细说明 ----
  const descMarkers = [
    /[：:]\s*说明\s*[：:]*\s*/,
    /[：:]\s*备注\s*[：:]*\s*/,
    /[：:]\s*描述\s*[：:]*\s*/,
    /说明\s*[：:]\s*/,
    /备注\s*[：:]\s*/,
    /描述\s*[：:]\s*/,
    /[，,]\s*具体(?:是|说|包含|有|说明|来讲|而言)\s*[：:]*\s*/,
    /[，,]\s*包含\s*/,
    /[，,。.]\s*需要\s*/,
    /[，,。.]\s*注意\s*/,
  ];

  let descStart = -1;
  let matchedMarkerLen = 0;
  for (const dm of descMarkers) {
    const match = remaining.match(dm);
    if (match && (descStart === -1 || match.index < descStart)) {
      descStart = match.index;
      matchedMarkerLen = match[0].length;
    }
  }

  if (descStart > 0) {
    result.description = remaining.slice(descStart + matchedMarkerLen).replace(/^[，,。.\s]+/, '').trim();
    remaining = remaining.slice(0, descStart).trim();
  }

  // ---- 6. 清理剩余文本 ----
  // 去掉日期/时间/地点提取后残留的结构标记
  remaining = remaining
    // 删除「一、xxx：」「二、xxx：」等编号标题行（内容已被提取，只剩空壳）
    .replace(/[一二三四五六七八九十\d]{1,2}[、，,]\s*\S*?[：:]\s*/g, ' ')
    // 删除独立的编号（如孤立的「三、」）
    .replace(/[一二三四五六七八九十\d]{1,2}[、，,]\s*(?=[\s，,。.；;]|$)/g, ' ')
    // 去掉首尾标点、空白、残留碎片字
    .replace(/^[，,。.；;、\s日号前后截到]+/, '')
    .replace(/[，,。.；;、\s日号前后截到]+$/, '')
    .replace(/[：:]\s*$/, '')
    .replace(/\s+/g, ' ')
    .trim();

  // ---- 7. 智能标题提取：长文本缩写成核心短语 ----
  if (remaining.length > 30) {
    let shortTitle = '';
    let extraDesc = '';

    // 6a. 提取【xxx】、［xxx］、[xxx] 括号内容作为标题
    let bracketMatch = remaining.match(/【([^】]+)】/);
    if (!bracketMatch) bracketMatch = remaining.match(/［([^］]+)］/);
    if (!bracketMatch) bracketMatch = remaining.match(/\[([^\]]+)\]/);
    if (bracketMatch) {
      shortTitle = bracketMatch[1].trim();
      extraDesc = remaining.replace(bracketMatch[0], ' ').replace(/\s+/g, ' ').trim();
    }

    // 6b. 没有方括号，尝试按第一个句子分割
    if (!shortTitle) {
      const sentenceSplit = remaining.match(/^(.{8,30}?)[。，,；;]\s*(.+)$/);
      if (sentenceSplit && sentenceSplit[2].length > 3) {
        shortTitle = sentenceSplit[1].trim();
        extraDesc = sentenceSplit[2].trim();
      }
    }

    // 6c. 截断过长文本
    if (!shortTitle && remaining.length > 25) {
      shortTitle = remaining.slice(0, 25).replace(/[，,。.；;、\s]+$/, '').trim();
      extraDesc = remaining.slice(shortTitle.length).replace(/^[，,。.；;、\s]+/, '').trim();
    }

    if (shortTitle) {
      remaining = shortTitle;
      if (extraDesc) {
        result.description = result.description
          ? result.description + '；' + extraDesc
          : extraDesc;
      }
    }
  }

  result.event = remaining || '未命名任务';

  return result;
}

// ---- 辅助函数 ----
function isValidDate(d) {
  return d instanceof Date && !isNaN(d.getTime());
}

function offsetDate(base, days) {
  const d = new Date(base);
  d.setDate(d.getDate() + days);
  return d;
}

function formatDate(d) {
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, '0');
  const day = String(d.getDate()).padStart(2, '0');
  return `${y}-${m}-${day}`;
}

const DAY_MAP = { '一': 1, '二': 2, '三': 3, '四': 4, '五': 5, '六': 6, '日': 0, '天': 0 };

function parseWeekday(dayChar, addWeeks) {
  const targetDay = DAY_MAP[dayChar];
  if (targetDay === undefined) return null;
  const today = new Date();
  today.setHours(0, 0, 0, 0);
  const currentDay = today.getDay();
  let diff = targetDay - currentDay;
  if (addWeeks > 0) {
    diff += addWeeks;
  } else {
    // 默认取最近的未来日期（不含今天）
    if (diff <= 0) diff += 7;
  }
  const result = new Date(today);
  result.setDate(today.getDate() + diff);
  return result;
}

function parseChineseNum(s) {
  const map = { '零': 0, '一': 1, '二': 2, '三': 3, '四': 4, '五': 5, '六': 6, '七': 7, '八': 8, '九': 9, '十': 10, '十一': 11, '十二': 12 };
  if (map[s] !== undefined) return map[s];
  if (/^十([一二三四五六七八九])$/.test(s)) return 10 + map[RegExp.$1];
  return parseInt(s) || 0;
}

// 任务操作
// ============================================================
function addTask() {
  const input = document.getElementById('taskInput');
  const text = input.value.trim();

  // 读取快捷操作栏的值
  const quickDateVal = document.getElementById('quickDate').value.trim();
  const quickTimeVal = document.getElementById('quickTime').value.trim();
  const quickLocationVal = document.getElementById('quickLocation').value.trim();
  const quickPriorityVal = document.getElementById('quickPriority').value.trim();
  const quickDescVal = document.getElementById('quickDesc').value.trim();

  // 至少需要核心事件文本
  if (!text) {
    showToast('⚠️ 请输入任务内容');
    input.focus();
    return;
  }

  // 先用自然语言解析
  const parsed = parseNaturalLanguage(text);
  if (!parsed) {
    showToast('⚠️ 无法解析输入内容');
    return;
  }

  // 快捷栏的值优先级更高：如果填了就覆盖自然语言解析结果
  if (quickDateVal) {
    const dateParsed = parseQuickDate(quickDateVal);
    if (dateParsed) parsed.deadlineDate = dateParsed;
  }
  if (quickTimeVal) {
    const timeParsed = parseQuickTime(quickTimeVal);
    if (timeParsed) parsed.deadlineTime = timeParsed;
  }
  if (quickPriorityVal) {
    const priParsed = parseQuickPriority(quickPriorityVal);
    if (priParsed) parsed.priority = priParsed;
  }

  // 地点、说明：快捷栏优先，否则用自然语言解析结果
  const finalLocation = quickLocationVal || parsed.location || '';
  const finalDesc = quickDescVal || parsed.description;

  const task = {
    id: generateId(),
    event: parsed.event,
    deadlineDate: parsed.deadlineDate,
    deadlineTime: parsed.deadlineTime,
    location: finalLocation,
    description: finalDesc,
    priority: parsed.priority,
    rawInput: text,
    completed: false,
    createdAt: new Date().toISOString()
  };

  tasks.unshift(task);
  saveTasks();
  input.value = '';
  clearQuickFields();
  input.focus();
  renderAll();
  const parts = ['✅ ' + (parsed.event.length > 20 ? parsed.event.slice(0, 20) + '...' : parsed.event)];
  if (finalLocation) parts.push('📍' + finalLocation);
  showToast(parts.join('  '));
}

// 快捷栏日期解析（复用自然语言解析引擎的日期识别能力）
function parseQuickDate(val) {
  if (!val) return null;
  const today = new Date();
  today.setHours(0, 0, 0, 0);

  // 点分隔完整: 2026.06.11
  let m = val.match(/^(\d{4})\.(\d{1,2})\.(\d{1,2})$/);
  if (m) return formatDate(new Date(parseInt(m[1]), parseInt(m[2]) - 1, parseInt(m[3])));

  // ISO格式
  m = val.match(/^(\d{4})[-\/](\d{1,2})[-\/](\d{1,2})$/);
  if (m) return formatDate(new Date(parseInt(m[1]), parseInt(m[2]) - 1, parseInt(m[3])));

  // 点分隔月日: 6.11
  m = val.match(/^(\d{1,2})\.(\d{1,2})$/);
  if (m) {
    let d = new Date(today.getFullYear(), parseInt(m[1]) - 1, parseInt(m[2]));
    if (d < today) d = new Date(today.getFullYear() + 1, parseInt(m[1]) - 1, parseInt(m[2]));
    return formatDate(d);
  }

  // X月X日
  m = val.match(/^(\d{1,2})\s*月\s*(\d{1,2})\s*[日号]?$/);
  if (m) {
    let d = new Date(today.getFullYear(), parseInt(m[1]) - 1, parseInt(m[2]));
    if (d < today) d = new Date(today.getFullYear() + 1, parseInt(m[1]) - 1, parseInt(m[2]));
    return formatDate(d);
  }

  // M/D
  m = val.match(/^(\d{1,2})[\/\-](\d{1,2})$/);
  if (m) {
    let d = new Date(today.getFullYear(), parseInt(m[1]) - 1, parseInt(m[2]));
    if (d < today) d = new Date(today.getFullYear() + 1, parseInt(m[1]) - 1, parseInt(m[2]));
    return formatDate(d);
  }

  // 相对日期（去掉明天）
  const relMap = { '今天': 0, '后天': 2, '大后天': 3 };
  if (relMap[val] !== undefined) return formatDate(offsetDate(today, relMap[val]));

  // 下周X
  m = val.match(/^下周\s*([一二三四五六日天])$/);
  if (m) { const d = parseWeekday(m[1], 7); return d ? formatDate(d) : null; }

  // 周X
  m = val.match(/^周\s*([一二三四五六日天])$/);
  if (m) { const d = parseWeekday(m[1], 0); return d ? formatDate(d) : null; }

  // N天后
  m = val.match(/^(\d+)\s*天\s*(?:后|之后)?$/);
  if (m) return formatDate(offsetDate(today, parseInt(m[1])));

  return null;
}

function parseQuickTime(val) {
  if (!val) return null;
  // HH:MM
  let m = val.match(/^(\d{1,2})[:：](\d{2})$/);
  if (m) {
    const h = parseInt(m[1]), min = parseInt(m[2]);
    if (h >= 0 && h < 24 && min >= 0 && min < 60) return String(h).padStart(2, '0') + ':' + String(min).padStart(2, '0');
  }
  // 中文时间：下午3点、上午10点半 等
  const t = parseChineseTime(val);
  return t;
}

function parseChineseTime(str) {
  const m = str.match(/^(凌晨|早上|上午|中午|下午|傍晚|晚上|夜里)\s*(\d{1,2}|一|二|三|四|五|六|七|八|九|十|十一|十二|零)[点\.]\s*(半|(\d{1,2})分?)?$/);
  if (!m) return null;
  const period = m[1];
  let hour = parseChineseNum(m[2]);
  const minute = m[3] === '半' ? 30 : (m[4] ? parseInt(m[4]) : 0);
  if (period === '凌晨') hour = (hour === 12 ? 0 : hour);
  else if (period === '早上' || period === '上午') hour = (hour === 12 ? 0 : hour);
  else if (period === '中午') hour = (hour === 12 ? 12 : hour + 12);
  else if (period === '下午' || period === '傍晚' || period === '晚上' || period === '夜里') hour = (hour === 12 ? 12 : hour + 12);
  if (hour >= 0 && hour < 24 && minute >= 0 && minute < 60) {
    return String(hour).padStart(2, '0') + ':' + String(minute).padStart(2, '0');
  }
  return null;
}

function parseQuickPriority(val) {
  if (!val) return null;
  if (/紧急|加急|ASAP|尽快|马上|立刻|赶紧|立即/i.test(val)) return 'urgent';
  if (/高|重要|优先/i.test(val)) return 'high';
  if (/低|不急|不着急|有空|闲了/i.test(val)) return 'low';
  if (/中|一般|普通|正常/i.test(val)) return 'medium';
  return null;
}

function clearQuickFields() {
  document.getElementById('quickDate').value = '';
  document.getElementById('quickTime').value = '';
  document.getElementById('quickLocation').value = '';
  document.getElementById('quickPriority').value = '';
  document.getElementById('quickDesc').value = '';
}

function toggleTask(id) {
  const task = tasks.find(t => t.id === id);
  if (!task) return;
  task.completed = !task.completed;
  saveTasks();
  // 只更新当前卡片的视觉样式，不重新排序
  const card = document.querySelector(`.task-card[data-id="${id}"]`);
  if (card) {
    if (task.completed) {
      card.classList.add('completed');
    } else {
      card.classList.remove('completed');
    }
    card.querySelector('input[type="checkbox"]').checked = task.completed;
  }
  updateStats();
}

function deleteTask(id) {
  if (!confirm('确定要删除这个任务吗？此操作不可恢复。')) return;
  tasks = tasks.filter(t => t.id !== id);
  saveTasks();
  renderAll();
  showToast('🗑 任务已删除');
}

function updateStats() {
  const total = tasks.length;
  const completed = tasks.filter(t => t.completed).length;
  document.getElementById('statTotal').textContent = total;
  document.getElementById('statActive').textContent = total - completed;
  document.getElementById('statDone').textContent = completed;
}

function refreshTasks() {
  renderAll();
  showToast('🔄 任务列表已刷新');
}

function clearCompleted() {
  const completedCount = tasks.filter(t => t.completed).length;
  if (completedCount === 0) {
    showToast('📭 没有已完成的任务');
    return;
  }
  if (!confirm(`确定要清空全部 ${completedCount} 个已完成任务吗？此操作不可恢复。`)) return;
  tasks = tasks.filter(t => !t.completed);
  saveTasks();
  renderAll();
  showToast(`🗑 已清空 ${completedCount} 个已完成任务`);
}

function clearInput() {
  document.getElementById('taskInput').value = '';
  clearQuickFields();
  document.getElementById('taskInput').focus();
}

  const task = tasks.find(t => t.id === id);

}

function closeModal() {
  editingId = null;
  document.getElementById('editModal').classList.remove('show');
}

function saveEdit() {
  if (!editingId) return;
  const task = tasks.find(t => t.id === editingId);
  if (!task) return;
  task.event = document.getElementById('editEvent').value.trim() || '未命名任务';
  task.deadlineDate = document.getElementById('editDate').value || null;
  task.deadlineTime = document.getElementById('editTime').value || null;
  task.location = document.getElementById('editLocation').value.trim();
  task.description = document.getElementById('editDesc').value.trim();
  task.priority = document.getElementById('editPriority').value;
  saveTasks();
  closeModal();
  renderAll();
  showToast('💾 任务已更新');
}

// 编辑弹窗只能通过「取消」或「保存」按钮关闭，点击遮罩不关闭

// ============================================================
// 导入导出
// ============================================================
function exportJSON() {
  const data = JSON.stringify(tasks, null, 2);
  const blob = new Blob([data], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  const now = new Date();
  const dateStr = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')}`;
  a.download = `任务备份_${dateStr}.json`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  showToast('📤 任务数据已导出');
}

function importJSON(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const data = JSON.parse(e.target.result);
      if (!Array.isArray(data)) throw new Error('数据格式错误');
      const count = data.length;
      // 合并导入：用 id 去重
      const existingIds = new Set(tasks.map(t => t.id));
      const newTasks = data.filter(t => !existingIds.has(t.id));
      tasks = [...newTasks, ...tasks];
      saveTasks();
      renderAll();
      showToast(`📥 成功导入 ${count} 个任务（新增 ${newTasks.length} 个）`);
    } catch(err) {
      showToast('❌ 文件格式错误，请选择有效的 JSON 文件');
    }
  };
  reader.readAsText(file);
  // 重置 file input 以便重复导入同一文件
  event.target.value = '';
}

// ============================================================
// Toast 提示
// ============================================================
let toastTimer = null;
function showToast(msg) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.classList.add('show');
  if (toastTimer) clearTimeout(toastTimer);
  toastTimer = setTimeout(() => {
    toast.classList.remove('show');
    toastTimer = null;
  }, 2000);
}

// ============================================================
// 渲染
// ============================================================
function getDeadlineTimestamp(task) {
  if (!task.deadlineDate) return Infinity;
  const dateStr = task.deadlineDate;
  const timeStr = task.deadlineTime || '23:59';
  return new Date(dateStr + 'T' + timeStr + ':00').getTime();
}

function isOverdue(task) {
  if (task.completed || !task.deadlineDate) return false;
  const dl = getDeadlineTimestamp(task);
  return dl < Date.now();
}

function formatDisplayDate(dateStr, timeStr) {
  if (!dateStr) return '无截止日期';
  const today = new Date();
  today.setHours(0, 0, 0, 0);
  const d = new Date(dateStr + 'T00:00:00');
  const diffDays = Math.round((d - today) / (1000 * 60 * 60 * 24));

  let label;
  if (diffDays === 0) label = '今天';
  else if (diffDays === 1) label = '明天';
  else if (diffDays === 2) label = '后天';
  else if (diffDays === 3) label = '大后天';
  else if (diffDays < 0) label = `已过期 ${Math.abs(diffDays)} 天`;
  else label = `${d.getMonth() + 1}月${d.getDate()}日`;

  // 加上星期几
  const weekDays = ['周日', '周一', '周二', '周三', '周四', '周五', '周六'];
  label += ' ' + weekDays[d.getDay()];

  if (timeStr) {
    label += ' ' + timeStr;
  }

  return label;
}

function createTaskCard(task) {
  const card = document.createElement('div');
  card.className = 'task-card priority-' + task.priority;
  card.setAttribute('data-id', task.id);
  if (task.completed) card.classList.add('completed');
  if (isOverdue(task)) card.classList.add('overdue');

  const displayDate = formatDisplayDate(task.deadlineDate, task.deadlineTime);
  const overdueText = isOverdue(task) ? ' ⚠️已过期' : '';

  const priorityLabels = { urgent: '紧急', high: '高', medium: '中', low: '低' };
  const priorityEmoji = { urgent: '🔴', high: '🟡', medium: '🟢', low: '⚪' };

  card.innerHTML = `
    <div class="card-top">
      <div class="checkbox-wrap">
        <input type="checkbox" ${task.completed ? 'checked' : ''} onchange="toggleTask('${task.id}')" title="标记完成">
      </div>
      <div class="card-body">
        <div class="task-event">${escapeHtml(task.event)}</div>
        <div class="task-meta">
          <span class="deadline-text">📅 ${displayDate}${overdueText}</span>
          ${task.location ? `<span class="location-text">📍 ${escapeHtml(task.location)}</span>` : ''}
          <span class="priority-badge ${task.priority}">${priorityEmoji[task.priority]} ${priorityLabels[task.priority]}优先级</span>
        </div>
        <div class="card-actions">
          <button class="btn btn-outline btn-sm" onclick="openEditModal('${task.id}')">✏️ 编辑</button>
          <button class="btn btn-outline btn-sm" onclick="showDetail('${task.id}')">📋 详情</button>
          <button class="btn btn-outline btn-sm" onclick="deleteTask('${task.id}')" style="color:#E74C3C;border-color:#E74C3C;">🗑 删除</button>
        </div>
      </div>
    </div>
  `;

  return card;
}

function showDetail(id) {
  const task = tasks.find(t => t.id === id);
  if (!task) return;
  document.getElementById('detailRaw').textContent = task.rawInput || '（无原始输入记录）';
  document.getElementById('detailDesc').textContent = task.description || '无说明内容';
  document.getElementById('detailModal').classList.add('show');
}

function closeDetail() {
  document.getElementById('detailModal').classList.remove('show');
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

function renderAll() {
  // 分离活跃和已完成
  const active = tasks.filter(t => !t.completed);
  const completed = tasks.filter(t => t.completed);

  // 活跃任务排序：有截止日期的按日期+时间排（近→远），无截止日期的按创建时间排（新→旧）
  active.sort((a, b) => {
    const aDL = getDeadlineTimestamp(a);
    const bDL = getDeadlineTimestamp(b);
    if (aDL !== bDL) return aDL - bDL;
    return new Date(b.createdAt) - new Date(a.createdAt);
  });

  // 已完成任务按完成先后排（隐性按原顺序即可，这里按创建时间倒序）
  completed.sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));

  // 渲染活跃列表
  const activeList = document.getElementById('activeTaskList');
  const emptyState = document.getElementById('emptyState');
  activeList.innerHTML = '';

  if (active.length === 0) {
    emptyState.style.display = 'block';
  } else {
    emptyState.style.display = 'none';
    active.forEach(task => {
      activeList.appendChild(createTaskCard(task));
    });
  }

  // 渲染已完成列表
  const completedSection = document.getElementById('completedSection');
  const completedList = document.getElementById('completedList');
  const completedCount = document.getElementById('completedCount');
  completedList.innerHTML = '';

  if (completed.length > 0) {
    completedSection.style.display = 'block';
    completedCount.textContent = completed.length;
    completed.forEach(task => {
      completedList.appendChild(createTaskCard(task));
    });
    // 默认展开已完成列表
    completedList.classList.add('show');
    document.getElementById('completedArrow').classList.add('open');
  } else {
    completedSection.style.display = 'none';
  }

  // 更新统计
  document.getElementById('statTotal').textContent = tasks.length;
  document.getElementById('statActive').textContent = active.length;
  document.getElementById('statDone').textContent = completed.length;
}

function toggleCompleted() {
  const list = document.getElementById('completedList');
  const arrow = document.getElementById('completedArrow');
  list.classList.toggle('show');
  arrow.classList.toggle('open');
}

// ============================================================
// 键盘快捷键
// ============================================================
document.addEventListener('keydown', function(e) {
  // Ctrl+Enter 提交
  if (e.ctrlKey && e.key === 'Enter') {
    e.preventDefault();
    addTask();
  }
  // Escape 关闭弹窗
  if (e.key === 'Escape') {
    if (document.getElementById('detailModal').classList.contains('show')) {
      closeDetail();
    } else if (document.getElementById('editModal').classList.contains('show')) {
      closeModal();
    }
  }
});

// ============================================================
// 初始化
// ============================================================
function init() {
  loadTasks();
  renderAll();
  // 默认展开已完成列表
  const completedList = document.getElementById('completedList');
  const completedArrow = document.getElementById('completedArrow');
  if (tasks.some(t => t.completed)) {
    completedList.classList.add('show');
    completedArrow.classList.add('open');
  }
  document.getElementById('taskInput').focus();
}

init();

console.log('   - 快捷键: Ctrl+Enter 提交任务，Esc 关闭弹窗');
